<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全方位歷屆試題下載器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- 引入 JSZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-box">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
            </div>
            <h1>全方位歷屆試題下載器</h1>
            <p>快速打包歷屆試題與解答為 ZIP 壓縮檔</p>
        </header>

        <main>
            <form id="downloadForm">
                
                <div class="toggle-container">
                    <label class="toggle-switch">
                        <input type="checkbox" id="schoolLevelToggle">
                        <span class="slider"></span>
                        <div class="toggle-labels">
                            <span class="label-left">國中會考</span>
                            <span class="label-right">高中大考</span>
                        </div>
                    </label>
                </div>

                <div class="form-group" id="highSchoolExamTypeGroup" style="display: none;">
                    <label for="highSchoolExamType">考試種類</label>
                    <select id="highSchoolExamType" name="highSchoolExamType">
                        <option value="學測" selected>學科能力測驗 (學測)</option>
                        <option value="分科測驗">分科測驗 (含原指考)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>考試科目 (可複選)</label>
                    <div class="checkbox-grid" id="subjectGrid">
                        <!-- 動態產生 Checkboxes -->
                    </div>
                </div>

                <div class="form-group">
                    <label>年份選擇模式</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="yearMode" value="single" checked> 單一年份
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="yearMode" value="range"> 年份範圍
                        </label>
                    </div>
                </div>

                <div class="form-row" id="yearInputRow">
                    <!-- 動態產生年份輸入框 -->
                </div>

                <button type="submit" id="submitBtn">
                    <span class="btn-text">開始打包下載</span>
                    <div class="spinner" id="spinner"></div>
                </button>
            </form>

            <div id="statusMessage" class="status-message hidden">
                <p>正在打包中，這可能需要一小段時間，請耐心等候...</p>
                <div class="progress-bar-container">
                    <div class="progress-bar"></div>
                </div>
            </div>
            
            <div id="errorMessage" class="error-message hidden">
                <p id="errorText"></p>
            </div>
            
            <div class="ai-prompts-section" style="margin-top: 32px; padding-top: 24px; border-top: 1px dashed var(--divider);">
                <p style="text-align: center; font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 16px; letter-spacing: 1px;">🤖 讓 AI 幫你找考卷</p>
                <div style="display: flex; gap: 12px; flex-direction: column;">
                    <button type="button" class="btn-outline" onclick="copyPrompt('web')" style="padding: 10px; font-size: 14px; background-color: rgba(16, 185, 129, 0.05);">
                        📋 複製網頁版 AI 提示詞 (ChatGPT/Gemini)
                    </button>
                    <button type="button" class="btn-outline" onclick="copyPrompt('agent')" style="padding: 10px; font-size: 14px; background-color: rgba(16, 185, 129, 0.05);">
                        🛠️ 複製 Agent AI 提示詞 (Cursor/Cline)
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- 自訂 Modal 視窗 -->
    <div id="groupingModal" class="modal hidden">
        <div class="modal-content">
            <h3>選擇分類方式</h3>
            <p>您選擇了多個科目，請問希望 ZIP 壓縮檔內的資料夾如何分類？</p>
            <div class="modal-actions">
                <button type="button" class="btn-outline" data-mode="subject">依科目分類</button>
                <button type="button" class="btn-outline" data-mode="year">依年份分類</button>
                <button type="button" class="btn-cancel" data-mode="cancel">取消打包</button>
            </div>
        </div>
    </div>

    <script>
        const schoolLevelToggle = document.getElementById('schoolLevelToggle');
        const highSchoolExamTypeGroup = document.getElementById('highSchoolExamTypeGroup');
        const highSchoolExamType = document.getElementById('highSchoolExamType');
        const subjectGrid = document.getElementById('subjectGrid');
        const yearInputRow = document.getElementById('yearInputRow');
        const yearModeRadios = document.getElementsByName('yearMode');
        const groupingModal = document.getElementById('groupingModal');

        const subjectsData = {
            '會考': [
                { value: '國文', label: '國文' },
                { value: '寫作測驗', label: '寫作測驗' },
                { value: '英文', label: '英文 (含聽力)' },
                { value: '數學', label: '數學' },
                { value: '社會', label: '社會' },
                { value: '自然', label: '自然' }
            ],
            '學測': [
                { value: '國文', label: '國文 (含國綜/國寫)' },
                { value: '英文', label: '英文' },
                { value: '數學A', label: '數學 A' },
                { value: '數學B', label: '數學 B' },
                { value: '社會', label: '社會' },
                { value: '自然', label: '自然' }
            ],
            '分科測驗': [
                { value: '國文', label: '國文' },
                { value: '英文', label: '英文' },
                { value: '數學甲', label: '數學甲' },
                { value: '數學乙', label: '數學乙' },
                { value: '歷史', label: '歷史' },
                { value: '地理', label: '地理' },
                { value: '公民與社會', label: '公民與社會' },
                { value: '物理', label: '物理' },
                { value: '化學', label: '化學' },
                { value: '生物', label: '生物' }
            ]
        };

        function updateUI() {
            let currentType = '';
            let minYear = 95;
            if (!schoolLevelToggle.checked) {
                currentType = '會考';
                highSchoolExamTypeGroup.style.display = 'none';
                minYear = 103;
            } else {
                currentType = highSchoolExamType.value;
                highSchoolExamTypeGroup.style.display = 'block';
                minYear = 95;
            }

            // 重新渲染科目 Checkboxes
            const options = subjectsData[currentType];
            subjectGrid.innerHTML = '';
            options.forEach(opt => {
                const label = document.createElement('label');
                label.className = 'checkbox-label';
                label.innerHTML = `<input type="checkbox" name="subject" value="${opt.value}"> <span>${opt.label}</span>`;
                subjectGrid.appendChild(label);
            });
            // 預設選中第一個
            if(subjectGrid.querySelector('input')) {
                subjectGrid.querySelector('input').checked = true;
            }

            renderYearInputs(minYear);
        }

        function renderYearInputs(minYear) {
            const mode = document.querySelector('input[name="yearMode"]:checked').value;
            yearInputRow.innerHTML = '';
            if (mode === 'single') {
                yearInputRow.innerHTML = `
                    <div class="form-group">
                        <label for="single_year">年份</label>
                        <input type="number" id="single_year" min="${minYear}" max="115" value="${Math.max(minYear, 115)}" required>
                    </div>
                `;
            } else {
                yearInputRow.innerHTML = `
                    <div class="form-group">
                        <label for="start_year">起始年份</label>
                        <input type="number" id="start_year" min="${minYear}" max="115" value="${Math.max(minYear, 110)}" required>
                    </div>
                    <div class="form-group">
                        <label for="end_year">結束年份</label>
                        <input type="number" id="end_year" min="${minYear}" max="115" value="115" required>
                    </div>
                `;
            }
        }

        schoolLevelToggle.addEventListener('change', updateUI);
        highSchoolExamType.addEventListener('change', updateUI);
        
        yearModeRadios.forEach(r => r.addEventListener('change', () => {
            const minYear = !schoolLevelToggle.checked ? 103 : 95;
            renderYearInputs(minYear);
        }));

        // 初始化 UI
        updateUI();

        document.getElementById('downloadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const selectedCheckboxes = document.querySelectorAll('input[name="subject"]:checked');
            if (selectedCheckboxes.length === 0) {
                showError("請至少選擇一個科目！");
                return;
            }

            const subjects = Array.from(selectedCheckboxes).map(cb => cb.value);
            const mode = document.querySelector('input[name="yearMode"]:checked').value;
            let startYear, endYear;

            if (mode === 'single') {
                startYear = endYear = parseInt(document.getElementById('single_year').value);
            } else {
                startYear = parseInt(document.getElementById('start_year').value);
                endYear = parseInt(document.getElementById('end_year').value);
            }
            
            if (startYear > endYear) {
                showError("起始年份不可大於結束年份！");
                return;
            }

            const isHighSchool = schoolLevelToggle.checked;
            const examCategory = isHighSchool ? highSchoolExamType.value : '會考';

            if (subjects.length > 1) {
                // 顯示分類選項 Modal
                groupingModal.classList.remove('hidden');
                
                // 設定一次性事件監聽器
                const handleModalClick = (e) => {
                    if (e.target.tagName === 'BUTTON') {
                        const groupingMode = e.target.getAttribute('data-mode');
                        groupingModal.classList.add('hidden');
                        groupingModal.removeEventListener('click', handleModalClick);
                        
                        if (groupingMode !== 'cancel') {
                            downloadExams(subjects, startYear, endYear, examCategory, groupingMode);
                        }
                    }
                };
                groupingModal.addEventListener('click', handleModalClick);
            } else {
                downloadExams(subjects, startYear, endYear, examCategory, 'none');
            }
        });

        async function downloadExams(subjects, startYear, endYear, examCategory, groupingMode) {
            const btn = document.getElementById('submitBtn');
            const spinner = document.getElementById('spinner');
            const btnText = document.querySelector('.btn-text');
            const statusMsg = document.getElementById('statusMessage');
            const errorMsg = document.getElementById('errorMessage');

            btn.disabled = true;
            spinner.style.display = 'block';
            btnText.textContent = '打包中...';
            statusMsg.classList.remove('hidden');
            errorMsg.classList.add('hidden');

            try {
                const zip = new JSZip();
                let foundAny = false;

                let possibleTypes = [];
                if (examCategory === '會考') {
                    possibleTypes = ["試卷", "答案", "聽力試卷", "聽力音檔"];
                } else {
                    possibleTypes = ["試題", "答案", "選擇題答案", "答題卷", "非選擇題評分原則"];
                }

                for (let subject of subjects) {
                    for (let year = startYear; year <= endYear; year++) {
                        for (let type of possibleTypes) {
                            let targetSubject = subject;
                            let filename;
                            
                            // 處理舊制數學
                            if (examCategory === '學測' && (subject === "數學A" || subject === "數學B") && year < 111) {
                                targetSubject = "數學";
                            }
                            
                            if (examCategory === '會考' && type === '答案') {
                                // 避免同一年份多次抓取會考答案
                                filename = `${year}-${examCategory}全部-${type}.pdf`;
                                // If zip already contains this file, skip to save bandwidth
                                if (zip.file(filename) || (groupingMode === 'subject' && zip.folder(subject).file(filename)) || (groupingMode === 'year' && zip.folder(`${year}年`).file(filename))) {
                                    continue;
                                }
                            } else {
                                const extension = (type === '聽力音檔') ? '.url' : '.pdf';
                                filename = `${year}-${examCategory}${targetSubject}-${type}${extension}`;
                            }
                            
                            const url = `pdfs/${filename}`;
                            
                            try {
                                const response = await fetch(url);
                                if (response.ok) {
                                    const blob = await response.blob();
                                    
                                    // 決定資料夾分類結構
                                    let targetFolder = zip;
                                    if (groupingMode === 'subject') {
                                        targetFolder = zip.folder(subject);
                                    } else if (groupingMode === 'year') {
                                        targetFolder = zip.folder(`${year}年`);
                                    }
                                    
                                    targetFolder.file(filename, blob);
                                    foundAny = true;
                                }
                            } catch (e) {
                                // Fetch 失敗忽略
                            }
                        }
                    }
                }

                if (!foundAny) {
                    throw new Error(`在這個年份區間找不到您所選的任何試題檔案。`);
                }

                // 產生 ZIP 檔
                const zipBlob = await zip.generateAsync({type:"blob"});
                const downloadUrl = window.URL.createObjectURL(zipBlob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = downloadUrl;
                const subjectsTitle = subjects.length > 1 ? '多科' : subjects[0];
                const yearTitle = startYear === endYear ? startYear : `${startYear}-${endYear}`;
                a.download = `${examCategory}_${subjectsTitle}_${yearTitle}.zip`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(downloadUrl);

            } catch (err) {
                showError(err.message);
            } finally {
                // Restore UI State
                btn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = '開始打包下載';
                statusMsg.classList.add('hidden');
            }
        }

        function showError(msg) {
            const errorMsg = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorMsg.classList.remove('hidden');
            errorText.textContent = msg;
        }
    </script>
</body>
</html>
